<div class="card p-4 shadow">

    <h2 class="mb-3">Register</h2>

    <form [formGroup]="registerForm" (ngSubmit)="submit()">

        <input class="form-control mb-3" placeholder="Name" formControlName="firstName">

        <input class="form-control mb-3" placeholder="Email" formControlName="email">

        <input type="password" class="form-control mb-3" placeholder="Password" formControlName="password">

        <button class="btn btn-dark w-100">
            Register
        </button>

    </form>

</div>
